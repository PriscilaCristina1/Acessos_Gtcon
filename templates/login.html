{% extends "layout.html" %}
{% block login_content %}
<div class="login-container">
  <div class="login-card">
    <div class="login-icon">
      <i class="bi bi-shield-lock-fill"></i>
    </div>
    <h2>GTCON Acessos</h2>
    <p class="text-muted">Sistema de Controle de Acessos</p>
    {% if error %}
    <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Senha Mestra</label>
        <input type="password" name="password" class="form-control" placeholder="Digite a senha..." required autofocus>
      </div>
      <button type="submit" class="btn btn-login w-100">Entrar</button>
    </form>
  </div>
</div>
{% endblock %}
